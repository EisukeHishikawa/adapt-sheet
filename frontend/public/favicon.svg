<!-- AdaptSheet AI のオリジナルファビコン。
     旧ファイルはテンプレート由来の汎用ロゴだったため、プロダクトの意味に合わせて自作した。
     モチーフ = 「帳票(=折り目付きの用紙 + フォーム行)」×「AI(=きらめき/スパークル)」。
     16pxでも潰れないよう、要素は最小限（角丸バッジ / 用紙 / 折り目 / 3本のフォーム行 / スパークル）に絞る。
     配色はアプリ本体がニュートラル基調で識別色を持たないため、ブランド識別としてindigo→violetの
     グラデーションを用い、AIの象徴に暖色(amber)のスパークルを1点だけ差してアクセントにする。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="AdaptSheet AI">
  <defs>
    <!-- バッジ背景: 左上→右下のindigo(6366F1)→violet(8B5CF6)グラデーション。 -->
    <linearGradient id="asBadge" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- 角丸スクエアのバッジ土台。 -->
  <rect width="32" height="32" rx="7.5" fill="url(#asBadge)"/>

  <!-- 帳票の用紙。右上に折り目(ドッグイヤー)を作るため、その頂点を切り欠いた形にする。 -->
  <path d="M9 8a2 2 0 0 1 2-2h6.6L23 11.4V24a2 2 0 0 1-2 2H11a2 2 0 0 1-2-2z" fill="#ffffff"/>
  <!-- 折り目部分。用紙よりわずかに暗い面にして、めくれた紙の陰影を表現する。 -->
  <path d="M17.6 6 23 11.4h-3.8a1.6 1.6 0 0 1-1.6-1.6z" fill="#C7D2FE"/>

  <!-- フォーム行(帳票の明細行)。3本目だけ短くして、記入欄のリズムを出す。 -->
  <rect x="11.6" y="14.4" width="8.8" height="1.7" rx="0.85" fill="#A5B4FC"/>
  <rect x="11.6" y="17.9" width="8.8" height="1.7" rx="0.85" fill="#A5B4FC"/>
  <rect x="11.6" y="21.4" width="5.2" height="1.7" rx="0.85" fill="#A5B4FC"/>

  <!-- AIのきらめき(4方向スパークル)。右下で用紙にわずかに重ね、まず白の縁取りで用紙から浮かせてから
       暖色(amber=FBBF24)の星を描く。凹んだ辺(制御点を中心寄りにする)で「キラッ」とした形にする。 -->
  <path d="M22.8 17.2c1 3 1.4 3.4 4.4 4.4-3 1-3.4 1.4-4.4 4.4-1-3-1.4-3.4-4.4-4.4 3-1 3.4-1.4 4.4-4.4Z" fill="#ffffff"/>
  <path d="M22.8 18.6c.78 2.34 1.06 2.62 3.4 3.4-2.34.78-2.62 1.06-3.4 3.4-.78-2.34-1.06-2.62-3.4-3.4 2.34-.78 2.62-1.06 3.4-3.4Z" fill="#FBBF24"/>
</svg>
