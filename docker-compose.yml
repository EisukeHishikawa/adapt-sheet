# 開発環境用のDocker Compose定義。開発はこの構成のみを対象とし、ローカル（非Docker）での
# 直接実行はサポートしない（ADR-010）。frontend/backend/doclingの3コンテナを連携させ、
# `docker compose up --build` 一発で開発環境を構築する。
# 本番デプロイ（AWS Lambda等）はdocs/deployment.mdのTerraform経由の別構成であり、本ファイルの対象外。
#
# 補足: Compose Specification移行に伴い`version:`キーは現行のDocker Compose CLIでは
# 不要（指定すると警告が出る）ため、あえて記載しない。

services:
  # ① フロントエンド (Vite + React)
  frontend:
    build: ./frontend
    ports:
      - "5173:5173" # Viteの開発サーバー既定ポート（package.json/vite.config.ts参照）
    volumes:
      - ./frontend:/app
      # ホスト側のnode_modules(macOS向けバイナリ)でコンテナ内のnode_modules(Linux向け)を
      # 上書きしないよう、無名ボリュームでコンテナ内のnode_modulesを保護する。
      - /app/node_modules
      # `npm run generate-types`はfrontendから見て`../backend/openapi.json`を相対参照するため
      # （package.json参照）、backendコンテナが書き出すopenapi.jsonを同じ相対位置に読み取り専用で
      # マウントし、コンテナが分かれていても型同期コマンドが動作するようにする。
      - ./backend/openapi.json:/backend/openapi.json:ro
    environment:
      # Supabase Auth SDK（DEVELOPMENT.md ステップ27）の接続先。プロジェクトルートの.env
      # （Git管理外）から`${...}`展開でコンテナに渡す。未設定時はlib/supabaseClient.tsが
      # クライアント生成をスキップし、ログイン機能自体を非表示にする（Supabaseプロジェクト
      # 未作成のローカル開発を壊さないため）。
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-}
    depends_on:
      - backend

  # ② ローカルDB (PostgreSQL、DEVELOPMENT.md ステップ28)
  # 生成履歴の保存先。本番のSupabase Postgresと同じスキーマ（backend/migrations）を当て、
  # クラウド環境を汚さずにマイグレーション・保存ロジックを検証できるようにする（ADR-019）。
  # backendコンテナからのみ接続される内部サービスのため、ホストへポートは公開しない。
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=adapt_sheet
      - POSTGRES_PASSWORD=adapt_sheet
      - POSTGRES_DB=adapt_sheet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adapt_sheet"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ③ バックエンド (FastAPI、入口エンドポイント)
  # ADR-014により、Docling本体（重量級ML依存）は④のdoclingコンテナへ分離した。
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # USE_MOCK_AI未設定時の既定（true）と同じだが、docker-compose環境の意図を明示するため
      # あえて記載する。実Gemini APIを使いたい場合はUSE_MOCK_AI=false/GEMINI_API_KEYを
      # 上書き設定する。
      - USE_MOCK_AI=true
      # GEMINI_API_KEYはプロジェクトルートの.env（Git管理外）から`${...}`展開でコンテナに渡す。
      # 既定（USE_MOCK_AI=true）では未使用だが、上記のとおりモックを無効化した際に
      # そのまま実Gemini APIを呼び出せるよう、キー自体は常に注入しておく。
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # 使用モデルは環境変数GEMINI_MODELで切り替え可能（未設定時はgemini-2.5-flash）。無料枠の
      # 日次クォータ（20回/日）はモデル単位のため、上限に達したら別モデルへ切り替えて継続できる（ADR-015）。
      # Geminiへの入力プロンプト全文と出力全文をログへ出す。業務データを含むため
      # コード側の既定は無効で、開発環境であるこの構成でのみ有効にする。
      - LOG_AI_PAYLOAD=true
      # ADR-014: テキスト抽出をdoclingサービスへHTTP委譲するための接続先。Compose内部DNS
      # （サービス名docling）で解決するため、ホストへは公開しない。
      # レイアウトHTML生成はbackend内のPyMuPDFで完結するため、専用サービスへの接続先は不要（ADR-015）。
      - DOCLING_SERVICE_URL=http://docling:8100
      # ADR-016: pdf2htmlEX専用サービスへの接続先。doclingと同じくCompose内部DNSで解決し、
      # ホストへは公開しない。
      - PDF2HTMLEX_SERVICE_URL=http://pdf2htmlex:8200
      # モデル選択機能（ADR-016）のClaude/OpenAI/Gemini標準プラン用キー。プロジェクトルートの
      # .env（Git管理外）から`${...}`展開でコンテナに渡す。GEMINI_API_KEYと同様、既定
      # （USE_MOCK_AI=true）では未使用だが、フェーズ5でゲートを解除した際にすぐ使えるよう
      # キー自体は常に注入しておく。
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Supabase発行JWTの検証鍵（app/services/auth.py、DEVELOPMENT.md ステップ27）。
      # 未設定時は常に未ログイン扱いになりゲート対象engineはfail-closedで403のまま
      # （SUPABASE_JWT_SECRET未設定のままゲートが解禁されることはない）。
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      # 各エンジンの使用モデルはCLAUDE_MODEL/OPENAI_MODEL/GEMINI_STANDARD_MODELで上書き可能
      # （未設定時の既定値はbackend/app/services/ai_client.py参照）。
      - CLAUDE_MODEL=${CLAUDE_MODEL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - GEMINI_STANDARD_MODEL=${GEMINI_STANDARD_MODEL:-}
      # 生成履歴の保存先（app/db.py、DEVELOPMENT.md ステップ28）。既定は上記②のローカルdbサービス。
      # 本番はSupabaseのPostgres接続文字列で上書きする（ADR-019）。未設定時はapp/db.pyが
      # DB接続を要求しない範囲（履歴保存のスキップ等）にとどめ、DB非依存のテストを壊さない。
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://adapt_sheet:adapt_sheet@db:5432/adapt_sheet}
    depends_on:
      db:
        condition: service_healthy
      docling:
        condition: service_started
      pdf2htmlex:
        condition: service_started

  # ④ Doclingによるテキスト抽出専用の内部サービス（ADR-014/015、DEVELOPMENT.md ステップ15）
  # torch/opencv-python等の重量級ML依存を含み、backendの起動速度に影響しないよう分離した。
  # backendコンテナからのみHTTPで呼び出される内部サービスのため、ホストへポートは公開しない。
  docling:
    build: ./docling-service
    volumes:
      - ./docling-service:/app
      # レイアウト解析・OCRモデルは初回変換時にインターネットから自動ダウンロードされる
      # （DEVELOPMENT.md ステップ23で予定しているDockerイメージへの事前焼き込みは未実施）。
      # 名前付きボリュームでダウンロード先を永続化し、`--force-recreate`等でコンテナを
      # 作り直しても再ダウンロードが発生しないようにする（初回のみ数十秒〜数分かかる）。
      - docling_hf_cache:/root/.cache/huggingface
      - docling_rapidocr_models:/usr/local/lib/python3.9/site-packages/rapidocr/models
    environment:
      # hf-xet（HuggingFaceの高速転送バックエンド）が使うCDN（*.cdn.hf.co）への名前解決が
      # 環境によっては不安定になり、レイアウト解析モデル（docling-layout-heron）のダウンロードが
      # 進まなくなる事象を確認した。huggingface.co自体への到達性はあるため、hf-xet経路を無効化して
      # 標準HTTPSダウンロードへフォールバックさせる。
      - HF_HUB_DISABLE_XET=1

  # ⑤ pdf2htmlEXによるPDF→HTML変換専用の内部サービス（ADR-016）
  # pdf2htmlEXバイナリは特殊パッチ済みpoppler等の重量級ネイティブ依存を含み、backend
  # （python:3.9-slimベース）には導入できないため、doclingと同じく別コンテナに分離する。
  # backendコンテナからのみHTTPで呼び出される内部サービスのため、ホストへポートは公開しない。
  pdf2htmlex:
    build: ./pdf2htmlex-service
    volumes:
      - ./pdf2htmlex-service:/app

  # ⑥ E2Eテスト (Playwright)
  # frontendの軽量なnode:20-alpineイメージはPlaywrightのブラウザバイナリ実行（glibc必須）に
  # 非対応のため、Microsoft公式のPlaywrightイメージ（frontend/Dockerfile.e2e）を使う独立コンテナ
  # として用意する（ADR-010）。frontend/backendのように常時起動する必要はないため、
  # `profiles`でopt-in化し、明示的に指定した場合のみ起動する
  # （例: `docker compose --profile e2e run --rm e2e`）。
  e2e:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # 起動済みのfrontendサービスに対してテストする（playwright.config.tsのwebServer自動起動を
      # スキップし、コンテナ間のサービス名で疎通する）。
      - PLAYWRIGHT_TEST_BASE_URL=http://frontend:5173
    depends_on:
      - frontend
    profiles:
      - e2e

# doclingサービスが初回PDF変換時にダウンロードするMLモデルの永続化用（上記docling.volumes参照）。
volumes:
  docling_hf_cache:
  docling_rapidocr_models:
  # ローカルdbサービスのデータ永続化用（上記db.volumes参照）。
  postgres_data:
